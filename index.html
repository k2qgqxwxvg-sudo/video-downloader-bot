<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Hunter</title>
  <style>
    body { background:#0a0a14; color:#fff; font-family:Arial; text-align:center; padding:20px; }
    h1 { color:#22ff88; }
    button { 
      padding:18px 40px; 
      font-size:20px; 
      margin:20px; 
      background:#22ff88; 
      color:black; 
      border:none; 
      border-radius:15px; 
      width:85%;
    }
    .grid { 
      display:grid; 
      grid-template-columns:repeat(5,1fr); 
      gap:10px; 
      max-width:340px; 
      margin:30px auto; 
    }
    .cell { 
      width:60px; 
      height:60px; 
      background:#1e1e2e; 
      border-radius:12px; 
      font-size:30px; 
      display:flex; 
      align-items:center; 
      justify-content:center; 
      cursor:pointer; 
    }
  </style>
</head>
<body>
  <h1>Gem Hunter</h1>
  <p>Нажми кнопку ниже</p>
  
  <button onclick="startGame()">Начать игру</button>

  <div class="grid" id="grid"></div>

  <script>
    function startGame() {
      alert("✅ Игра запущена!");

      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.textContent = '❓';
        cell.onclick = function() {
          this.textContent = '💎';
          this.style.background = '#22ff88';
        };
        grid.appendChild(cell);
      }
    }
  </script>
</body>
</html>
