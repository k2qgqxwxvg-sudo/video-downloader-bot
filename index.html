<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Hunter</title>
  <style>
    body { background:#0a0a14; color:white; font-family:Arial; text-align:center; margin:0; padding:10px; }
    h1 { color:#22ff88; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:340px; margin:20px auto; }
    .cell { width:60px; height:60px; background:#1e1e2e; border-radius:12px; font-size:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .cell.opened { cursor:default; }
    .gem { background:#22ff88 !important; }
    .bomb { background:#ff4444 !important; }
    button { padding:12px 24px; margin:10px; font-size:18px; border:none; border-radius:12px; background:#22ff88; color:black; }
  </style>
</head>
<body>
  <h1>Gem Hunter</h1>
  <p>Ставка: <input type="number" id="bet" value="1000" style="width:100px"></p>
  <p>Мины: <select id="mines"><option value="3">3</option><option value="5" selected>5</option><option value="8">8</option><option value="10">10</option></select></p>

  <div class="grid" id="grid"></div>

  <button onclick="startGame()">Начать игру</button>
  <button onclick="cashOut()" id="cashout" style="display:none;background:#ffaa00;">💰 Забрать выигрыш</button>

  <script>
    let grid = [], bombs = 5, bet = 1000, opened = 0, gameOver = false, multiplier = 1;

    function startGame() {
      bombs = parseInt(document.getElementById('mines').value);
      bet = parseInt(document.getElementById('bet').value) || 1000;
      gameOver = false;
      opened = 0;
      multiplier = 1;

      grid = Array(25).fill(0);
      let placed = 0;
      while (placed < bombs) {
        let idx = Math.floor(Math.random() * 25);
        if (grid[idx] === 0) { grid[idx] = 1; placed++; }
      }

      const g = document.getElementById('grid');
      g.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.onclick = () => openCell(i, cell);
        g.appendChild(cell);
      }
      document.getElementById('cashout').style.display = 'inline-block';
    }

    function openCell(i, cell) {
      if (gameOver || cell.classList.contains('opened')) return;
      cell.classList.add('opened');
      opened++;

      if (grid[i] === 1) {
        cell.classList.add('bomb');
        cell.innerHTML = '💥';
        gameOver = true;
        setTimeout(() => alert('💥 Бомба! Вы проиграли.'), 300);
      } else {
        cell.classList.add('gem');
        cell.innerHTML = '💎';
        multiplier = (1 + opened * 0.4).toFixed(2);
      }
    }

    function cashOut() {
      if (gameOver) return;
      const win = Math.floor(bet * multiplier);
      
      // Отправляем выигрыш обратно в бот
      Telegram.WebApp.sendData(JSON.stringify({
        action: "win",
        amount: win
      }));

      alert(`💰 Вы выиграли ${win} монет!`);
      document.getElementById('cashout').style.display = 'none';
    }

    // Инициализация
    window.onload = startGame;
  </script>
</body>
</html>
