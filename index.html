<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Hunter</title>
  <style>
    body { background:#0f0f1a; color:white; font-family:Arial; text-align:center; margin:0; padding:15px; }
    h1 { color:#22ff88; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; max-width:340px; margin:20px auto; }
    .cell { 
      width:62px; height:62px; background:#1e1e2e; border-radius:12px; 
      font-size:34px; display:flex; align-items:center; justify-content:center; 
      cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.6);
    }
    .cell.opened { cursor:default; }
    .gem { background:#22ff88 !important; }
    .bomb { background:#ff3366 !important; }
    button { padding:12px 30px; margin:10px; font-size:17px; border:none; border-radius:12px; background:#22ff88; color:black; }
  </style>
</head>
<body>
  <h1>Gem Hunter</h1>
  <p>Мины: 5 | Ставка: 500</p>
  
  <div class="grid" id="grid"></div>
  
  <button onclick="newGame()">Новая игра</button>

  <script>
    let grid = Array(25).fill(0);
    let bombs = 5;
    let opened = 0;

    function newGame() {
      opened = 0;
      grid = Array(25).fill(0);
      
      let placed = 0;
      while (placed < bombs) {
        let idx = Math.floor(Math.random() * 25);
        if (grid[idx] === 0) {
          grid[idx] = 1;
          placed++;
        }
      }

      const g = document.getElementById('grid');
      g.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.onclick = () => openCell(i, cell);
        g.appendChild(cell);
      }
    }
