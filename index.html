<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Hunter</title>
  <style>
    body { background:#0a0a14; color:#fff; font-family:Arial; text-align:center; margin:0; padding:15px; }
    h1 { color:#22ff88; }
    .controls { margin:15px 0; }
    select, input, button { padding:12px; margin:5px; font-size:16px; border-radius:10px; }
    button { background:#22ff88; color:black; border:none; padding:14px 28px; font-weight:bold; }
    .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; max-width:340px; margin:20px auto; }
    .cell { 
      width:62px; height:62px; background:#1e1e2e; border-radius:12px; 
      font-size:32px; display:flex; align-items:center; justify-content:center; 
      cursor:pointer; box-shadow:0 4px 15px rgba(0,0,0,0.6);
    }
    .cell.opened { cursor:default; }
    .gem { background:#22ff88 !important; animation:pop 0.3s; }
    .bomb { background:#ff3366 !important; }
    @keyframes pop { from{transform:scale(0.6);} to{transform:scale(1);} }
  </style>
</head>
<body>
  <h1>Gem Hunter</h1>
  
  <div class="controls">
    Мины: 
    <select id="mines">
      <option value="3">3</option>
      <option value="5" selected>5</option>
      <option value="7">7</option>
      <option value="10">10</option>
    </select>
    Ставка: <input type="number" id="bet" value="500" style="width:90px">
    <button onclick="startGame()">Начать игру</button>
  </div>

  <div class="grid" id="grid"></div>

  <button onclick="cashOut()" id="cashout" style="display:none; background:#ffaa00; margin-top:15px;">
    💰 Забрать выигрыш
  </button>

  <script>
    let grid = [], bombs = 5, bet = 500, opened = 0, gameOver = false, multiplier = 1;

    function startGame() {
      bombs = parseInt(document.getElementById('mines').value);
      bet = parseInt(document.getElementById('bet').value) || 500;

      // Отправляем ставку в бот
      Telegram.WebApp.sendData(JSON.stringify({ action: "bet", amount: bet }));

      gameOver = false;
      opened = 0;
      multiplier = 1;

      grid = Array(25).fill(0);
      let placed = 0;
      while (placed < bombs) {
        let idx = Math.floor(Math.random() * 25);
        if (grid[idx] === 0) {
          grid[idx] = 1;
          placed++;
        }
      }

      const g = document.getElementById('grid');
      g.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.dataset.index = i;
        cell.onclick = () => openCell(i, cell);
        g.appendChild(cell);
      }
      document.getElementById('cashout').style.display = 'inline-block';
    }
