<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Hunter</title>
  <style>
    body { background:#0a0a14; color:white; font-family:Arial; text-align:center; padding:20px; }
    button { 
      padding:20px 40px; 
      font-size:20px; 
      margin:20px; 
      background:#22ff88; 
      color:black; 
      border:none; 
      border-radius:15px; 
      width:80%;
    }
  </style>
</head>
<body>
  <h1 style="color:#22ff88;">Gem Hunter</h1>
  <p>Тестовая версия</p>
  
  <button onclick="startTest()">Начать игру (тест)</button>

  <script>
    function startTest() {
      alert("✅ Кнопка работает! Игра запустилась.");
      
      // Создаём простое поле
      let html = '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:340px;margin:20px auto;">';
      for (let i = 0; i < 25; i++) {
        html += `<div onclick="this.style.background=\'#22ff88\';this.innerHTML=\'💎\'" 
                     style="width:60px;height:60px;background:#1e1e2e;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:30px;cursor:pointer;">
                  ❓
                </div>`;
      }
      html += '</div>';
      document.body.innerHTML += html;
    }
  </script>
</body>
</html>
